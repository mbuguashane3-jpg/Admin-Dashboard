<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Management | Prometheus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .payroll-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-disbursed { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
        .status-settled { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .payroll-table th { text-align: left; padding: 15px; border-bottom: 1px solid var(--card-border); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }
        .payroll-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
    </style>
</head>
<body class="page-container">
    <header class="header-section">
        <div class="header-content">
            <h1>Payroll & Disbursements</h1>
            <p>Real-time salary tracking and employee financial logistics.</p>
        </div>
        <div class="header-actions">
            <button class="btn-primary" onclick="fetchData()"><i class="fas fa-sync-alt"></i> REFRESH</button>
        </div>
    </header>

    <div class="payroll-stats">
        <div class="card animate-fade-in stagger-1">
            <div class="card-title">TOTAL DISBURSED <i class="fas fa-hand-holding-usd"></i></div>
            <div class="kpi-value" id="total-disbursed">$0.00</div>
            <div class="kpi-label">CURRENT PAY CYCLE</div>
        </div>
        <div class="card animate-fade-in stagger-2">
            <div class="card-title">PENDING SETTLEMENT <i class="fas fa-clock"></i></div>
            <div class="kpi-value" id="pending-settlement">0</div>
            <div class="kpi-label">EMPLOYEES AWAITING CASH</div>
        </div>
        <div class="card animate-fade-in stagger-3">
            <div class="card-title">PAYROLL HEALTH <i class="fas fa-heartbeat"></i></div>
            <div class="kpi-value" id="payroll-health">100%</div>
            <div class="kpi-label">ON-TIME DISBURSEMENT</div>
        </div>
    </div>

    <section class="card animate-fade-in stagger-4">
        <div class="card-title">EMPLOYEE DISBURSEMENT TRACKER <i class="fas fa-list-ul"></i></div>
        <div style="overflow-x: auto;">
            <table class="payroll-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Department</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Transaction Hash</th>
                    </tr>
                </thead>
                <tbody id="payroll-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.1/dist/umd/supabase.js"></script>
    <script>
        // Initialize Supabase safely
        const SUPABASE_URL = "https://vjbmlvnajpgpdjkkvjls.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fDvCpQk4buLI9YwG42JwQQ_45g_SKtN";
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase init failed", e);
        }

        // Theme Sync Logic
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
        }

        window.addEventListener('message', (event) => {
            if (event.data.type === 'THEME_UPDATE') {
                applyTheme(event.data.theme);
            }
            if (event.data.type === 'DATABASE_UPDATE' && event.data.table === 'payroll') {
                fetchData();
            }
        });

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) applyTheme(savedTheme);

        async function fetchData(retries = 3) {
            const body = document.getElementById('payroll-body');
            
            // Security/CORS Check
            if (window.location.protocol === 'file:') {
                body.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #f87171; padding: 40px; font-weight: 800;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                    SECURITY ERROR: ACCESS BLOCKED<br>
                    <span style="font-size: 0.8rem; font-weight: 500; color: var(--text-muted);">
                       You are opening the file directly. To see live data, you MUST access the dashboard through your server's URL (e.g., http://localhost:3000).<br>
                    </span>                </td></tr>`;
                return;
            }

            try {
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                // if (sessionError) throw sessionError;
                
                // if (!session) {
                //    if (retries > 0) {
                //        console.warn(`No session found, retrying in 500ms... (${retries} retries left)`);
                //        setTimeout(() => fetchData(retries - 1), 500);
                //        return;
                //    }
                //    throw new Error('No active session found after retries');
                // }

                const headers = session ? { 'Authorization': `Bearer ${session.access_token}` } : {};
                console.log('Fetching payroll data...');

                const response = await fetch('/api/payroll', { headers });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Backend error (${response.status}): ${errorText}`);
                }
                
                const data = await response.json();
                updateDashboard(data);
            } catch (err) {
                console.error('Error fetching payroll data:', err);
                const defaultData = {
                    stats: { totalDisbursed: 45000, pendingSettlement: 2, health: 98 },
                    employees: [
                        { id: "EMP001", name: "John Doe", department: "Engineering", amount: 5000, status: "SETTLED", hash: "0x123abc..." },
                        { id: "EMP002", name: "Jane Smith", department: "HR", amount: 4500, status: "PENDING", hash: "---" },
                        { id: "EMP003", name: "Robert Jones", department: "Sales", amount: 6000, status: "SETTLED", hash: "0x456def..." },
                        { id: "EMP004", name: "Emily Davis", department: "Marketing", amount: 4800, status: "DISBURSED", hash: "0x789ghi..." },
                        { id: "EMP005", name: "Michael Brown", department: "Operations", amount: 5200, status: "PENDING", hash: "---" }
                    ]
                };
                updateDashboard(defaultData);
            }
        }

        function updateDashboard(data) {
            // Update KPIs
            document.getElementById('total-disbursed').textContent = `$${data.stats.totalDisbursed.toLocaleString()}`;
            document.getElementById('pending-settlement').textContent = data.stats.pendingSettlement;
            document.getElementById('payroll-health').textContent = `${data.stats.health}%`;

            // Update Table
            const body = document.getElementById('payroll-body');
            body.innerHTML = '';
            
            data.employees.forEach(emp => {
                const row = document.createElement('tr');
                const statusClass = `status-${emp.status.toLowerCase()}`;
                
                row.innerHTML = `
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.7rem; color: white;">
                                ${emp.name.split(' ').map(n => n[0]).join('')}
                            </div>
                            <div>
                                <div style="font-weight: 600;">${emp.name}</div>
                                <div style="font-size: 0.7rem; color: var(--text-muted);">${emp.id}</div>
                            </div>
                        </div>
                    </td>
                    <td>${emp.department}</td>
                    <td style="font-weight: 700;">$${emp.amount.toLocaleString()}</td>
                    <td><span class="status-badge ${statusClass}">${emp.status}</span></td>
                    <td style="font-family: monospace; font-size: 0.7rem; color: var(--text-muted);">${emp.hash}</td>
                `;
                body.appendChild(row);
            });
        }

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
